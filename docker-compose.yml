services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hairbook}
      POSTGRES_USER: ${POSTGRES_USER:-hairbook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hairbook}
      TZ: Europe/Warsaw
      PGTZ: Europe/Warsaw
    ports:
      - "5432:5432"
    volumes:
      - hairbook-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hairbook} -d ${POSTGRES_DB:-hairbook}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-hairbook}:${POSTGRES_PASSWORD:-hairbook}@db:5432/${POSTGRES_DB:-hairbook}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-1234}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      PORT: 5173
      HOST: 0.0.0.0
      TZ: Europe/Warsaw
      PGTZ: Europe/Warsaw
    ports:
      - "${APP_PORT:-5173}:5173"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  hairbook-postgres:
