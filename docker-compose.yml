services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hairbook
      POSTGRES_USER: hairbook
      POSTGRES_PASSWORD: hairbook
      TZ: Europe/Warsaw
      PGTZ: Europe/Warsaw
    ports:
      - "5432:5432"
    volumes:
      - hairbook-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hairbook -d hairbook"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    environment:
      DATABASE_URL: postgres://hairbook:hairbook@db:5432/hairbook
      DEMO_PASSWORD: hairbook123
      COOKIE_SECURE: "false"
      PORT: 5173
      HOST: 0.0.0.0
      TZ: Europe/Warsaw
      PGTZ: Europe/Warsaw
    ports:
      - "5173:5173"
    depends_on:
      db:
        condition: service_healthy

volumes:
  hairbook-postgres:
